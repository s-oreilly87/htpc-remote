
#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;

    server {
            server_name remote-app;

            root "../pages";

            # Serve any static assets with NGINX
            location /_next/static {
                #alias "../.next/static";
                alias "/app/.next/static";
                add_header Cache-Control "public, max-age=3600, immutable";
            }

            location / {
                try_files $uri $uri/ /index.html # only serve html files from this dir
                @public
                @nextjs;
                add_header Cache-Control "public, max-age=3600";
            }

            location @public {
                add_header Cache-Control "public, max-age=3600";
            }

            location @nextjs {
                # reverse proxy for next server
                proxy_pass http://remote-app:3000;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_cache_bypass $http_upgrade;
            }

            listen [::]:443 ssl;
            listen 443 ssl default_server;

            ssl_certificate "/etc/certificates/remote-app-cert.pem";
            ssl_certificate_key "/etc/certificates/remote-app-key.pem";
        }

        server {
            if ($host = 192.168.1.245) {
                return 301 https://$host$request_uri;
            }

            listen 80 ;
            listen [::]:80 ;
            server_name 192.168.1.245;
            return 301 https://$host$request_uri;
        }
}
