<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Eventghost Webserver</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>

    <body>
        <div style="max-width: 500px; margin: auto">
            <h1>Eventghost Webserver for HTPC Remote</h1>
            <p> This webserver is live and receiving events from remote-next-app, which can be accessed at:</p>
            <h4>
                <a href="https://192.168.1.227:4000">https://192.168.1.227:4000</a>
            </h4>
            <p> Events can be manually sent by appending them to this url after a '?'</p>
            <h3> Example: </h3>
            <h4>
                <a href="https://192.168.1.227:4005?testEvent">https://192.168.1.227:4005?testEvent</a>
            </h4>
        </div>
    </body>
</html>
