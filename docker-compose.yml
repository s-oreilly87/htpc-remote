  remote-app:
    container_name: remote-app
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVER_IP: 192.168.1.100
        NEXT_PUBLIC_PLATFORM: PC
    privileged: true
    restart: always
    ports:
      - '0.0.0.0:3000:3000'
    networks:
      - app-network

